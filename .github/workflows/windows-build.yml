name: "Windows Build"

on: workflow_dispatch

jobs:
  build-windows:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: "windows-latest"
      target: "x86_64-pc-windows-msvc"
      build-args: ""
      sign-binaries: false
      asset-prefix: "parrot-windows-test"
      upload-artifacts: true
    secrets: inherit
